name: 🧪 Kajal Ki Rasoi — Automated Tests

on:
  push:
    branches: ['**']          # Every branch push triggers tests
  pull_request:
    branches: [main, develop] # Gate merges to main/develop

jobs:
  # ─── Job 1: Unit + Integration Tests ────────────────────────────────────────
  unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit tests with coverage
        run: npx jest --testPathPatterns="unit" --coverage --coverageReporters=text,lcov
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-kajal' }}
          NODE_ENV: test

      - name: Run integration tests
        run: npx jest --testPathPatterns="integration"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-kajal' }}
          NODE_ENV: test

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ─── Job 2: Component / Hook Tests ──────────────────────────────────────────
  component:
    name: Component & Hook Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run component tests
        run: npx jest --testPathPatterns="component"
        env:
          NODE_ENV: test

  # ─── Job 3: TypeScript type check ───────────────────────────────────────────
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript compile check
        run: npx tsc --noEmit

  # ─── Job 4: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint

  # ─── Job 5: E2E Tests (runs against deployed feature branch) ────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Only run E2E on PRs to main/develop, or when BASE_URL is set
    if: >
      github.event_name == 'pull_request' ||
      vars.RUN_E2E == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E tests against feature branch
        run: npx playwright test
        env:
          # Set BASE_URL to your Railway / Vercel / Render feature branch URL
          BASE_URL: ${{ vars.FEATURE_BRANCH_URL || 'http://localhost:3000' }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ─── Job 6: Regression gate — block PR if any job fails ─────────────────────
  regression-gate:
    name: ✅ Regression Gate
    runs-on: ubuntu-latest
    needs: [unit-integration, component, typecheck, lint]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.unit-integration.result }}" != "success" ||
                "${{ needs.component.result }}"       != "success" ||
                "${{ needs.typecheck.result }}"       != "success" ||
                "${{ needs.lint.result }}"            != "success" ]]; then
            echo "❌ One or more jobs failed — regression detected!"
            exit 1
          fi
          echo "✅ All checks passed — safe to merge."

name: Kajal Ki Rasoi - Automated Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  unit-integration:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run unit tests with coverage
        run: npx jest --testPathPatterns="unit" --coverage --coverageReporters=text,lcov
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-kajal' }}
          NODE_ENV: test

      - name: Run integration tests
        run: npx jest --testPathPatterns="integration"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-kajal' }}
          NODE_ENV: test

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  component:
    name: Component and Hook Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run component tests
        run: npx jest --testPathPatterns="component"
        env:
          NODE_ENV: test

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: TypeScript compile check
        run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run ESLint
        run: npm run lint

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      vars.RUN_E2E == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E tests against feature branch
        run: npx playwright test
        env:
          BASE_URL: ${{ vars.FEATURE_BRANCH_URL || 'http://localhost:3000' }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  regression-gate:
    name: Regression Gate
    runs-on: ubuntu-latest
    needs: [unit-integration, component, typecheck, lint]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          set -euo pipefail

          unit_result="${{ needs['unit-integration'].result }}"
          component_result="${{ needs.component.result }}"
          typecheck_result="${{ needs.typecheck.result }}"
          lint_result="${{ needs.lint.result }}"

          echo "unit-integration: ${unit_result}"
          echo "component: ${component_result}"
          echo "typecheck: ${typecheck_result}"
          echo "lint: ${lint_result}"

          failures=()
          [[ "${unit_result}" == "success" ]] || failures+=("unit-integration=${unit_result}")
          [[ "${component_result}" == "success" ]] || failures+=("component=${component_result}")
          [[ "${typecheck_result}" == "success" ]] || failures+=("typecheck=${typecheck_result}")
          [[ "${lint_result}" == "success" ]] || failures+=("lint=${lint_result}")

          if (( ${#failures[@]} > 0 )); then
            echo "One or more jobs failed - regression detected!"
            printf '  - %s\n' "${failures[@]}"
            exit 1
          fi

          echo "All checks passed - safe to merge."
